name: Deploy WordPress Theme via FTP

on:
  push:
    branches: [main]
    paths:
      - 'theme/**'

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy theme to Turhost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TURHOST_FTP_HOST }}
          username: ${{ secrets.TURHOST_FTP_USER }}
          password: ${{ secrets.TURHOST_FTP_PASSWORD }}
          local-dir: ./theme/
          server-dir: public_html/wp-content/themes/bitebimuv/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
