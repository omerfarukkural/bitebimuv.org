# BiteBiMuv.org - Otomatik WordPress Tema Deploy Workflow
# GitHub'a her push'ta temayı otomatik olarak sunucuya deploy eder.
#
# Gerekli GitHub Secrets (Settings > Secrets and variables > Actions):
#   SFTP_HOST      - Sunucu hostname/IP (orn: bitebimuv.org veya 1.2.3.4)
#   SFTP_USERNAME  - SFTP/SSH kullanıcı adı
#   SFTP_PASSWORD  - SFTP/SSH şifre (SSH key kullanılıyorsa gerek yok)
#   SFTP_PRIVATE_KEY - SSH özel anahtarı (password yerine)
#   REMOTE_PATH    - Uzak sunucu tema yolu
#                    Orn: /var/www/html/wp-content/themes/bitebimuv-dernek
#   WP_CLI_PATH    - WP-CLI yolu (orn: wp veya /usr/local/bin/wp)

name: 🚀 BiteBiMuv.org - Tema Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy ortamı'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  THEME_NAME: bitebimuv-dernek
  PHP_VERSION: '8.2'

jobs:
  # =========================================================
  # JOB 1: Lint ve sözdizimi kontrolü
  # =========================================================
  lint:
    name: 🔍 Kod Kalite Kontrolü
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: PHP kur
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: phpcs
          coverage: none

      - name: PHP sözdizimi kontrolü
        run: |
          find . -name "*.php" \
            -not -path "./.git/*" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            | xargs -I {} php -l {} 2>&1 | grep -E "(Error|Warning)" || true
          echo "✅ PHP sözdizimi kontrolü tamamlandı."

      - name: Dosya boyutu kontrolü
        run: |
          echo "📊 Tema dosya boyutları:"
          du -sh . --exclude=.git
          echo "✅ Boyut kontrolü tamam."

  # =========================================================
  # JOB 2: Tema paketi oluştur
  # =========================================================
  build:
    name: 📦 Tema Paketi Oluştur
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Tema paketini oluştur
        run: |
          mkdir -p /tmp/theme-package/${{ env.THEME_NAME }}
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='*.md' \
            --exclude='.gitignore' \
            . /tmp/theme-package/${{ env.THEME_NAME }}/
          echo "✅ Tema paketi oluşturuldu:"
          ls -la /tmp/theme-package/${{ env.THEME_NAME }}/

      - name: Paket artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: theme-package
          path: /tmp/theme-package/
          retention-days: 5

  # =========================================================
  # JOB 3: Sunucuya deploy et (SFTP/SSH)
  # =========================================================
  deploy:
    name: 🌍 Sunucuya Deploy Et
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://www.bitebimuv.org

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Build artifact indir
        uses: actions/download-artifact@v4
        with:
          name: theme-package
          path: /tmp/theme-package/

      # --- SFTP DEPLOY (FTP/SFTP hosting için) ---
      - name: 📡 SFTP ile deploy et
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          ssh_private_key: ${{ secrets.SFTP_PRIVATE_KEY }}
          local_path: /tmp/theme-package/${{ env.THEME_NAME }}
          remote_path: ${{ secrets.REMOTE_PATH }}
          delete_remote_files: true
          sftp_only: false
        continue-on-error: true
        id: sftp-deploy

      # --- SSH + RSYNC DEPLOY (VPS/dedicated server için alternatif) ---
      # Bu adımı SFTP yerine kullanmak istersen aktif hale getir.
      # - name: 📡 SSH + rsync ile deploy et
      #   uses: burnett01/rsync-deployments@7.0.1
      #   with:
      #     switches: -avzr --delete --exclude='.git'
      #     path: /tmp/theme-package/${{ env.THEME_NAME }}/
      #     remote_path: ${{ secrets.REMOTE_PATH }}/
      #     remote_host: ${{ secrets.SFTP_HOST }}
      #     remote_user: ${{ secrets.SFTP_USERNAME }}
      #     remote_key: ${{ secrets.SFTP_PRIVATE_KEY }}

      # --- WP-CLI ile temayı aktif et ---
      - name: 🎨 WP-CLI ile temayı aktif et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          key: ${{ secrets.SFTP_PRIVATE_KEY }}
          script: |
            # WP-CLI yolu
            WP="${WP_CLI_PATH:-wp}"

            # WordPress klök dizine git (REMOTE_PATH'ten belirle)
            WP_ROOT=$(echo "${{ secrets.REMOTE_PATH }}" | sed 's|/wp-content/themes/.*||')

            if [ -f "$WP_ROOT/wp-config.php" ]; then
              cd "$WP_ROOT"

              # Temayı aktif et
              $WP theme activate ${{ env.THEME_NAME }} --allow-root || true

              # Cache temizle
              $WP cache flush --allow-root || true
              $WP rewrite flush --allow-root || true

              echo "✅ Tema aktif edildi ve cache temizlendi."
            else
              echo "⚠️ WP kök dizin bulunamadı: $WP_ROOT"
              echo "⚠️ Temayı WordPress panelinden manuel olarak aktif edin."
            fi
        continue-on-error: true

      - name: 🎉 Deploy tamamlandı!
        run: |
          echo "================================================"
          echo "🎉 BiteBiMuv Dernek teması başarıyla deploy edildi!"
          echo "🌐 Site: https://www.bitebimuv.org"
          echo "🕑 Deploy zamanı: $(date '+%d/%m/%Y %H:%M:%S %Z')"
          echo "🌿 Commit: ${{ github.sha }}"
          echo "================================================"

  # =========================================================
  # JOB 4: WordPress.com deploy (WordPress.com hosting için)
  # =========================================================
  # Bu job yalnızca WordPress.com hosting kullanılıyorsa aktif edilmeli.
  # Secrets: WP_COM_SITE_ID, WP_COM_TOKEN
  #
  # deploy-wpcom:
  #   name: 📤 WordPress.com Deploy
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: theme-package
  #         path: /tmp/theme-package/
  #
  #     - name: WordPress.com REST API ile yukleme
  #       run: |
  #         cd /tmp/theme-package/
  #         zip -r ${{ env.THEME_NAME }}.zip ${{ env.THEME_NAME }}/
  #
  #         curl -X POST \
  #           -H "Authorization: Bearer ${{ secrets.WP_COM_TOKEN }}" \
  #           -F "themezip=@${{ env.THEME_NAME }}.zip" \
  #           "https://public-api.wordpress.com/rest/v1.1/sites/${{ secrets.WP_COM_SITE_ID }}/themes/mine"

  # =========================================================
  # JOB 5: Bildirim
  # =========================================================
  notify:
    name: 💬 Bildirim Gönder
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deploy sonucunu bildir
        run: |
          STATUS="${{ needs.deploy.result }}"
          if [ "$STATUS" = "success" ]; then
            echo "✅ Deploy başarılı: bitebimuv.org güncellendi!"
          else
            echo "❌ Deploy başarısız! Log'ları kontrol edin."
          fi
          # Slack/email bildirimi için:
          # secrets.SLACK_WEBHOOK_URL veya secrets.NOTIFY_EMAIL ekleyin
