# Bu workflow WordPress tema repository'si için devre dışı bırakıldı.
# WordPress PHP teması Jekyll ile deploy edilemez.
# Deployment: deploy-theme.yml (FTP → Turhost) kullanın.
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Sadece manuel tetikleme — otomatik push trigger kaldırıldı
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Bu workflow devre dışı
        run: |
          echo "Bu repository bir WordPress temasıdır."
          echo "GitHub Pages (Jekyll) deployment uygun değildir."
          echo "FTP deploy için deploy-theme.yml workflow'unu kullanın."
          exit 0
