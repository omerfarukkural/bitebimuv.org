# /etc/nginx/sites-available/n8n.bitebimuv.org
# Certbot SSL ekledikten sonra bu dosya otomatik güncellenir

server {
    listen 80;
    server_name n8n.bitebimuv.org;

    # Certbot için ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS yönlendirme
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name n8n.bitebimuv.org;

    # SSL sertifikaları (Certbot tarafından doldurulur)
    ssl_certificate     /etc/letsencrypt/live/n8n.bitebimuv.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.bitebimuv.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy ayarları
    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        client_max_body_size 64m;
    }
}
